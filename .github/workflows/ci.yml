name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast feedback: lint + unit tests on Linux (driver uses its stub backend).
  lint:
    name: fmt + clippy + test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --workspace --all-features

  # Full build + test matrix. The driver is Windows-native; Linux exercises
  # the stub backend so the whole workspace must stay green on both.
  build:
    name: build + test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --workspace --all-features
      - name: test
        run: cargo test --workspace --all-features

  # The real acceptance bar, continuously: record→replay drives Notepad
  # through UI Automation on the runner itself (Calculator isn't on Windows
  # Server images; Notepad is).
  e2e:
    name: notepad E2E (windows)
    needs: lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: record and replay Notepad via UIA
        run: cargo test -p flowproof-cli --test notepad_e2e -- --nocapture
        env:
          FLOWPROOF_E2E: "1"
      - name: cleanup stray notepad
        if: always()
        shell: pwsh
        run: taskkill /F /IM notepad.exe; exit 0

  python-sdk:
    name: ruff + pytest (sdk/python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: ruff
        run: |
          uv run --group dev ruff check .
          uv run --group dev ruff format --check .
      - name: pytest
        run: uv run --group dev pytest
