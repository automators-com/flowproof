name: CI

on:
  push:
    branches: [main]
  # `labeled` is included so adding the `full-ci` label re-runs CI and
  # picks up the Windows job on demand; without it a label change fires no
  # run until the next push.
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  # Nightly full run: the Windows build + E2E is off the PR path (see the
  # `windows` job), so a scheduled run is the backstop that catches a
  # Windows regression within a day even if nothing merged to main and no
  # PR carried the `full-ci` label. 05:00 UTC, a quiet hour.
  schedule:
    - cron: "0 5 * * *"

# A new push to the same branch makes the previous run's answer worthless,
# so stop paying for it. Runs on main are never cancelled: those are the
# ones that gate a release.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Does anything need to run at all? A docs- or spec-only PR cannot change
  # how the engine behaves: rustfmt and clippy do not read Markdown, the
  # wheel is built from the Rust crates, and the two E2E jobs cost ~50
  # minutes between them. So EVERY other job hangs off this one, and a
  # one-file doc change costs a single six-second job instead of five.
  #
  # `build` and the E2E jobs need `lint`, so gating `lint` skips them
  # transitively - GitHub skips a job whose dependency was skipped.
  #
  # Pushes to main always run everything: that is the branch a release is
  # cut from, and a missed regression there is worth far more than the
  # minutes.
  scope:
    name: what changed
    runs-on: ubuntu-latest
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "engine=true" >> "$GITHUB_OUTPUT"
            echo "not a pull request: running everything"
            exit 0
          fi
          base=$(git merge-base origin/${{ github.base_ref }} HEAD)
          changed=$(git diff --name-only "$base" HEAD)
          echo "$changed"
          # Anything outside docs, specs, and the loop's own bookkeeping can
          # reach the engine. Deliberately generous: the cost of a wrong
          # "skip" is a missed regression, the cost of a wrong "run" is time.
          if echo "$changed" | grep -qvE '^(docs/|examples/|README\.md|CONTRIBUTING\.md|\.loop/|.*\.md$)'; then
            echo "engine=true" >> "$GITHUB_OUTPUT"
          else
            echo "engine=false" >> "$GITHUB_OUTPUT"
            echo "docs/spec-only change: skipping the E2E jobs"
          fi

  # Fast feedback: lint + unit tests on Linux (driver uses its stub backend).
  lint:
    name: fmt + clippy + test (ubuntu)
    needs: scope
    if: needs.scope.outputs.engine == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --workspace --all-features

  # Ubuntu build + test on every PR (fast runner, stub driver backend). The
  # Windows build folds into the `windows` job below so the workspace
  # compiles once on Windows, not twice. Depends only on `scope`, so it runs
  # in parallel with lint - a lint failure fails the run anyway.
  build:
    name: build + test (ubuntu)
    needs: scope
    if: needs.scope.outputs.engine == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --workspace --all-features
      - name: test
        run: cargo test --workspace --all-features

  # Windows build + the real acceptance bar in ONE job: the workspace
  # compiles and unit-tests on Windows, record→replay drives Notepad through
  # UI Automation (Calculator isn't on Windows Server images; Notepad is),
  # and the SAP COM engine runs against a simulator. One cold build, not two.
  #
  # OFF the PR merge path by choice: a Windows runner queues for minutes and
  # the E2E is slow, so most PRs should not wait on it. It runs on every push
  # to `main` (a Windows regression is caught within one merge), nightly (the
  # backstop), and on demand for a PR carrying the `full-ci` label - add that
  # label to any PR touching the Windows driver, the SAP adapter, or the
  # shared record/replay engine.
  windows:
    name: windows build + E2E
    needs: scope
    if: >-
      needs.scope.outputs.engine == 'true' &&
      (github.event_name == 'push' ||
       github.event_name == 'schedule' ||
       contains(github.event.pull_request.labels.*.name, 'full-ci'))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build + test (windows)
        run: |
          cargo build --workspace --all-features
          cargo test --workspace --all-features
      - name: record and replay Notepad via UIA
        run: cargo test -p flowproof-cli --test notepad_e2e -- --nocapture
        env:
          FLOWPROOF_E2E: "1"
      - name: LLM-author a freeform Notepad flow (UIA scene, fake model server)
        run: cargo test -p flowproof-cli --test notepad_author_e2e -- --nocapture
        env:
          FLOWPROOF_E2E: "1"
      # The REAL SAP COM engine against a simulated scripting API — no SAP
      # install needed; proves the late-binding layer end to end.
      - name: SAP scripting E2E (real COM engine, simulator)
        run: |
          pip install pywin32
          cargo test -p flowproof-cli --test sap_sim_e2e -- --nocapture
        env:
          FLOWPROOF_E2E: "1"
      - name: cleanup stray notepad
        if: always()
        shell: pwsh
        run: taskkill /F /IM notepad.exe; exit 0

  # Cross-platform proof: the same record→replay spine drives a real
  # browser, plus the real-OCR vision pipeline. Heavy: the 18 browser tests
  # run one at a time (concurrent Chromium flakes CDP on a 2-core runner) at
  # ~100s each, ~31 min, and real OCR adds ~7 min. Compile is 8s - this is
  # pure runtime, so it cannot be cached down.
  #
  # OFF the PR merge path for the same reason as the Windows job: a PR
  # should not wait 40 minutes. The unit suite (`cargo test --workspace`,
  # 300+ tests including mock-driver record/replay) runs on every PR; this
  # real-browser/real-OCR proof runs on push to `main`, nightly, and on
  # demand for a PR labelled `full-ci`.
  e2e-web:
    name: web E2E (ubuntu)
    needs: scope
    if: >-
      needs.scope.outputs.engine == 'true' &&
      (github.event_name == 'push' ||
       github.event_name == 'schedule' ||
       contains(github.event.pull_request.labels.*.name, 'full-ci'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # --test-threads=1: each test launches its own Chromium; running them
      # concurrently on the 2-core runner flakes CDP queries under load.
      - name: record and replay a browser flow in headless Chromium
        run: cargo test -p flowproof-cli --test web_e2e -- --nocapture --test-threads=1
        env:
          FLOWPROOF_E2E: "1"
          CHROME: /usr/bin/google-chrome
      - name: LLM-author a freeform flow (local fake model server, zero tokens)
        run: cargo test -p flowproof-cli --test llm_author_e2e -- --nocapture --test-threads=1
        env:
          FLOWPROOF_E2E: "1"
          CHROME: /usr/bin/google-chrome
      - name: cache OCR models
        uses: actions/cache@v4
        with:
          path: ~/.cache/flowproof/ocrs
          key: ocrs-models-v1
      # REAL OCR, no real window: the production ocrs engine reads
      # synthetically rendered screens through the full record→replay
      # pipeline — the vision provenance proven on every push.
      - name: table-cell addressing survives a row insert (#58)
        run: cargo test -p flowproof-cli --test grid_cell_e2e -- --nocapture
        env:
          FLOWPROOF_E2E: "1"
          CHROME: /usr/bin/google-chrome
      - name: vision pipeline (real OCR over synthetic screens)
        run: cargo test -p flowproof-cli --test vision_pipeline -- --nocapture
        env:
          FLOWPROOF_E2E: "1"

  python-sdk:
    name: ruff + pytest (sdk/python)
    needs: scope
    if: needs.scope.outputs.engine == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: ruff
        run: |
          uv run --group dev ruff check .
          uv run --group dev ruff format --check .
      - name: pytest
        run: uv run --group dev pytest
