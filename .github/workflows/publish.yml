name: Publish to PyPI

# Manual releases only. Publishing uses PyPI Trusted Publishing (OIDC) via
# the `pypi` environment — no stored tokens.
on:
  workflow_dispatch:

jobs:
  # Fail in seconds, not after a 7-minute wheel matrix: PyPI versions are
  # immutable, so dispatching without a version bump can only end in
  # "400 File already exists" at upload (it burned both the 0.2.0 and
  # 0.2.1 releases). Also catches Cargo.toml/pyproject version skew.
  guard:
    name: version is new on PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail fast if this version is already published
        run: |
          version=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          py_version=$(grep -m1 '^version = ' sdk/python/pyproject.toml | cut -d'"' -f2)
          echo "Cargo.toml: $version / pyproject.toml: $py_version"
          if [ -z "$version" ] || [ "$version" != "$py_version" ]; then
            echo "::error::version mismatch — Cargo.toml '$version' vs sdk/python/pyproject.toml '$py_version'; bump both together"
            exit 1
          fi
          code=$(curl -sS -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/flowproof/${version}/json")
          case "$code" in
            404) echo "flowproof $version is not on PyPI yet — proceeding" ;;
            200) echo "::error::flowproof $version is already on PyPI (versions are immutable) — bump Cargo.toml + sdk/python/pyproject.toml first"; exit 1 ;;
            *)   echo "::error::unexpected HTTP $code from PyPI — refusing to guess; re-run when the index answers"; exit 1 ;;
          esac

  # The wheel embeds the Rust engine, so each platform builds its own.
  build:
    needs: guard
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: dist-linux
          - os: windows-latest
            artifact: dist-windows
          - os: macos-latest
            artifact: dist-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      # sdist FIRST: it runs on the host, and the manylinux wheel step below
      # runs in a container as root — if the container creates dist/ first,
      # the host user cannot write into it (permission denied).
      - name: Build sdist
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: sdk/python
          command: sdist
          args: --out dist

      # maturin-action builds the Linux wheel inside a manylinux container —
      # PyPI rejects raw `linux_x86_64` platform tags. On windows/macos it
      # runs maturin natively (the manylinux input is ignored there).
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: sdk/python
          command: build
          args: --release --out dist
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: sdk/python/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-all
          merge-multiple: true

      - name: Collect wheels and one sdist
        # Every platform's `python -m build` produces an equivalent sdist;
        # keep exactly one so PyPI doesn't reject duplicates.
        run: |
          ls -la dist-all
          mkdir dist
          mv dist-all/*.whl dist/
          mv $(ls dist-all/*.tar.gz | head -1) dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
