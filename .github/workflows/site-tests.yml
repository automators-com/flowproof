name: site tests (automators.ai)

# Dogfood suite: flowproof driving the real automators.ai site. Runs on
# pushes to its own branch (runners have open internet + Chrome; the
# authoring sandbox does not).
on:
  push:
    branches: ['claude/flowproof-site-tests']

env:
  CARGO_TERM_COLOR: always

# contents: write lets the suite commit its rendered visuals back to this
# branch, which is the only transport the authoring sandbox can read (the
# artifact blob store is outside its network policy).
permissions:
  contents: write

jobs:
  suite:
    name: record + replay against the live site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build CLI
        run: cargo build -p flowproof-cli
      - name: run the suite (record proves the flow live, replay proves determinism)
        env:
          CHROME: /usr/bin/google-chrome
        run: |
          set -u
          BIN=target/debug/flowproof
          mkdir -p site-results
          summary="| spec | record | replay |"$'\n'"|---|---|---|"
          overall=0
          for spec in examples/site/automators/*.flow.yaml; do
            name=$(basename "$spec" .flow.yaml)
            echo "::group::$name"
            rec=FAIL; rep=SKIP
            if "$BIN" record "$spec" --out "site-results/$name.trace.jsonl"; then
              rec=PASS
              if "$BIN" run "$spec" --trace "site-results/$name.trace.jsonl"; then
                rep=PASS
              else
                rep=FAIL; overall=1
              fi
            else
              overall=1
            fi
            echo "::endgroup::"
            echo "RESULT $name record=$rec replay=$rep"
            summary="$summary"$'\n'"| $name | $rec | $rep |"
          done
          echo "$summary" >> "$GITHUB_STEP_SUMMARY"
          echo "$summary"
          exit $overall
      - name: upload run artifacts (traces, result.json, report.html, frames)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-test-results
          path: site-results/
          if-no-files-found: warn
          # run bundles live under site-results/.flowproof/ — dotted dirs
          # are skipped unless this is set, which would drop result.json,
          # report.html and the recorded frames from the artifact
          include-hidden-files: true
      # The authoring sandbox can reach api.github.com but not the artifact
      # blob store, so the human-viewable renderings (filmstrip GIF per
      # flow + report screenshot) travel base64-encoded through the job log.
      - name: render filmstrip GIFs + report screenshots, ship via log
        if: always()
        run: |
          set -u
          mkdir -p visuals
          # Copy each trace's authoring frames (GIF assembly happens in the
          # authoring sandbox — runners no longer ship ffmpeg).
          for trace in site-results/*.trace.jsonl; do
            name=$(basename "$trace" .trace.jsonl)
            dir=$(python3 -c "import json,sys; print(json.loads(open(sys.argv[1]).readline()).get('recording',{}).get('dir',''))" "$trace")
            frames="site-results/$dir"
            if [ -n "$dir" ] && ls "$frames"/frame-*.png >/dev/null 2>&1; then
              mkdir -p "visuals/frames-$name"
              cp "$frames"/frame-*.png "visuals/frames-$name/"
            fi
          done
          # Screenshot each replay run's report.html, named by its flow.
          for run in site-results/.flowproof/runs/*/; do
            [ -f "$run/report.html" ] || continue
            name=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['name'])" "$run/result.json" \
              | tr ' ' '-' | tr -cd 'A-Za-z0-9-' | cut -c1-40)
            google-chrome --headless=new --no-sandbox --disable-gpu \
              --window-size=1000,2400 --screenshot="visuals/report-$name.png" \
              "file://$PWD/$run/report.html" 2>/dev/null || true
          done
          ls -la visuals
      - name: commit visuals back to this branch ([skip ci] avoids a loop)
        if: always()
        run: |
          set -u
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf site-visuals && mv visuals site-visuals
          git add -f site-visuals
          git commit -m "site-tests: rendered visuals from run ${{ github.run_id }} [skip ci]" || exit 0
          git pull --rebase origin "${{ github.ref_name }}" || true
          git push origin "HEAD:${{ github.ref_name }}"

  recon:
    name: recon (page text + ids)
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and summarize pages
        run: |
          set -u
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          fetch() { curl -sSL --max-time 30 -A "$UA" "$1"; }
          summarize() {
            local url="$1" html
            echo "===================================================="
            echo "PAGE $url"
            html=$(fetch "$url") || { echo "FETCH FAILED"; return; }
            echo "-- status/title:"
            printf '%s' "$html" | grep -o '<title[^>]*>[^<]*' | head -2
            echo "-- ids:"
            printf '%s' "$html" | grep -o 'id="[^"]*"' | sort -u | head -60
            echo "-- forms/inputs/buttons:"
            printf '%s' "$html" | grep -o '<\(form\|input\|button\|textarea\|select\)[^>]*>' | head -40
            echo "-- links (same host):"
            printf '%s' "$html" | grep -o 'href="[^"]*"' | sort -u | head -80
            echo "-- visible text (tags stripped):"
            printf '%s' "$html" | sed 's/<script[^>]*>.*<\/script>//g' \
              | sed 's/<style[^>]*>.*<\/style>//g' \
              | sed 's/<[^>]*>/ /g' | tr -s ' \n' ' \n' | grep -v '^\s*$' | head -120
          }
          summarize "https://automators.ai"
          echo "==== sitemap ===="
          fetch "https://automators.ai/sitemap.xml" | head -100 || true
          # Same-host subpages discovered from the homepage nav:
          for path in $(fetch "https://automators.ai" | grep -o 'href="/[^"]*"' \
              | sed 's/href="//;s/"//' | grep -v '^/#' | grep -v '\.\(css\|js\|png\|svg\|ico\|woff2\?\)' \
              | sort -u | head -8); do
            summarize "https://automators.ai${path}"
          done
