# An authenticated JSON POST with no UI at all (`app: api`) — the
# "API test in UI clothing" shape: POST a payload, assert on the response.
# The session token and connection string travel as ${VAR} references:
# resolved from the environment when the probe fires (record and every
# replay), never stored in the trace.
#
# `body` is any YAML (mapping/list/string), sent as JSON with an automatic
# `content-type: application/json` — set your own content-type header to
# override. A body on GET/HEAD/DELETE is rejected at parse time.
#
# Illustrative: mirrors DataMaker's real `POST /connections/test` contract
# (as of Jul 2026) — the field is `type`, and an unsupported provider
# answers 500 with this body. Adapt the shape to your own API.
name: Test database providers
app: api
steps:
  - assert_api:
      request: POST ${DM_API}/connections/test
      headers:
        Authorization: Bearer ${DM_SESSION_TOKEN}
      body:
        type: postgres
        connectionString: ${TEST_CONN_STRING}
      status: 500
      body_contains: "Database not yet supported!"
