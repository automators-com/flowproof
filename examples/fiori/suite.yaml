# Suite context for the Fiori flows: test data is MINTED, not hardcoded.
#
# `env_from` runs once before any flow (for `run` on this directory, and
# for `record`/single-flow `run` on any spec under it — the manifest is
# discovered by walking up from the spec). Its stdout must be KEY=VALUE
# lines; a non-zero exit or malformed line aborts the run. Swap the
# command for whatever your DataMaker CLI exposes — the contract is only
# "print the vars the specs reference".
#
#   $ datamaker sap info-record pick --plant 1010 --format env
#   MATERIAL=100-100
#   SUPPLIER=17300001
#   PLANT=1010
#   NET_PRICE=123.45
#
env_from: datamaker sap info-record pick --plant 1010 --format env

# Ambient values passed through (and composable with captured ones via
# ${VAR}). Credentials stay in the environment — traces only ever store
# the raw ${VAR} reference.
env:
  FIORI_BASE_URL: ${FIORI_BASE_URL}
  SAP_ODATA_BASE: ${SAP_ODATA_BASE}
