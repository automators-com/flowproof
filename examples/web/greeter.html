<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Greeter</title>
  </head>
  <body>
    <h1>Greeter</h1>
    <input id="name" placeholder="Your name" />
    <button
      id="greet"
      onclick="document.getElementById('greeting').textContent =
        'Hello, ' + document.getElementById('name').value + '!'"
    >
      Greet
    </button>
    <div id="greeting"></div>
  </body>
</html>
