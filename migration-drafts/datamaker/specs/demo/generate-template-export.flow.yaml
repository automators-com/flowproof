# Migrates: demo-generate.test.ts :: "create a Customers template -> live
# data -> save -> export CSV".
# Reduced coverage: the download *event* and CSV filename are out of scope
# (GAPS.md) — the export contract lives in the API suite. Two generator
# fields instead of five keeps the react-select dance readable; each extra
# field is the same 4-step block with an ordinal qualifier.
name: Demo - build a Customers template, preview, save, export CSV
app: web
url: ${DM_BASE_URL}/templates             # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows templates found within 30s
  - Press the "Add Template" button
  - Type Customers into the templateName field
  - Type firstName into the "Field Name" field
  - Click "css:[data-test='data-type']"     # shipped in PR #21
  - Type First Name                          # shipped in PR #21
  - Click "First Name"                       # react-select option (role='option')
  - Press the "Add Field" button
  - Type email into the 2nd "Field Name" field           # shipped in PR #21
  - Click the 2nd "css:[data-test='data-type']"          # shipped in PR #21
  - Type E-Mail
  - Click "E-Mail"
  - assert: the "css:#live_preview" shows firstName within 15s   # shipped in PR #22
  - assert: the "css:#live_preview" shows email within 15s
  - Press the "Save" button
  - Wait until page shows Customers within 15s
  - Click "Customers"
  - Press the "Export" button
  - Press the "CSV" button
  - assert: page shows Download within 15s
