# Migrates: demo-chat.test.ts :: "submitting a prompt drives the agent
# pipeline to a terminal state" — GATED, like the original (needs
# datamaker-opencode + an AI provider key; RUN_AGENT_E2E in Playwright).
# Reduced coverage: the SSE/network asserts become the visible terminal
# status. Agent output is non-deterministic by nature, so this spec belongs
# in a gated lane, not the default suite.
name: Demo - chat prompt reaches a terminal agent status
app: web
url: ${DM_BASE_URL}/chat                  # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows Send within 30s
  - Type Generate 5 realistic customer profiles with name, email and country. into the "Ask the agent" field   # shipped in PR #21
  - Press the "Send" button
  - Wait until page shows idle within 180s
