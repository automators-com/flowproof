# Migrates: demo-connect.test.ts :: "register an API connection - GET a
# public Cat Facts API" (needs outbound internet, like the original).
# APP TODO: the preview section's chevron toggle has no stable hook (the
# Playwright test used an xpath relative to the "Preview" header). Add
# data-test='previewToggle' to formField.tsx's toggle button, then the last
# three steps work; until then they are the only unmigratable steps here.
name: Demo - register a public API connection and fire its preview
app: web
url: ${DM_BASE_URL}/connections           # GAP-1
session:                                   # GAP-1
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows connections found within 30s
  - Press the "Add Connection" button
  - Click "REST API"                        # GAP-2: prefix match
  - Type Cat Facts API into the "eg. Datamaker Usage Statistics EUW" field
  - Press the "Next step" button
  - Click "GET"
  - Type https://catfact.ninja/fact into the "css:[name='url']" field   # GAP-2: css target
  - Press the "Next step" button
  - Click "None"
  - Press the "Next step" button
  - Wait until page shows Your connection is now ready to use. within 15s
  - Press the "Close" button
  - Click "Cat Facts API"
  - Click "css:button[data-test='previewToggle']"   # GAP-2 + APP TODO (see header)
  - Press the "Send" button
  - assert: page shows "fact" within 25s
