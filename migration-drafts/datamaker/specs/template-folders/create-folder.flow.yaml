# Migrates: templateFolders.test.ts :: "Create template folder"
# Playwright asserted the POST + API folder count; the UI outcome is a new
# folder row appearing.
# VERIFY IN-APP: the default name of a newly created folder ("New Folder"
# assumed here).
name: Template folders - create a folder
app: web
url: ${DM_BASE_URL}/templates             # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows templates found within 30s
  - Press the "Add Folder" button
  - assert: page shows New Folder within 15s
