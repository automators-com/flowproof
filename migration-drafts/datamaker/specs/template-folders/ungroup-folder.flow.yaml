# Migrates: templateFolders.test.ts :: "Add template to folder and ungroup folder"
# The Playwright test moved a template into the folder via a raw API PUT
# first — unnecessary here: the seeded folder already contains
# playwrightTemplate. Ungroup and assert the folder is gone while its
# template survives at root.
name: Template folders - ungroup a folder
app: web
url: ${DM_BASE_URL}/templates             # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows 2 templates found within 30s
  - Click "css:[data-test='folderInstance'] [data-test='expand']"   # shipped in PR #21
  - Click "Ungroup Folder"
  - assert: page does not show playwrightTemplateFolder within 15s  # shipped in PR #22
  - assert: page shows playwrightTemplate
