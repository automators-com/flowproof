# Migrates: templateFolders.test.ts :: "Rename template folder"
# The rename input carries the current folder name as its value attribute —
# the same anchor the Playwright test used ([value='...']).
name: Template folders - rename a folder
app: web
url: ${DM_BASE_URL}/templates             # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows templates found within 30s
  - Click "css:[data-test='folderInstance'] [data-test='expand']"   # shipped in PR #21
  - Click "Rename Folder"
  - Clear the "css:[value='playwrightTemplateFolder']" field        # shipped in PR #21
  - Type Renamed Folder into the "css:[value='playwrightTemplateFolder']" field
  - Press Enter                                                     # shipped in PR #21
  - assert: page shows Renamed Folder within 10s
