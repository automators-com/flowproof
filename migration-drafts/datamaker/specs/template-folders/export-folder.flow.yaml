# Migrates: templateFolders.test.ts :: "Export template folder"
name: Template folders - export a folder
app: web
url: ${DM_BASE_URL}/templates             # GAP-1
session:                                   # GAP-1
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows templates found within 30s
  - Click "css:[data-test='folderInstance'] [data-test='expand']"   # GAP-2: css target
  - Click "Export Folder"
  - assert: page shows Exporting folder within 10s
