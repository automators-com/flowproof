# Migrates: templateFolders.test.ts :: "Open template form from folder"
name: Template folders - open the template form from a folder
app: web
url: ${DM_BASE_URL}/templates             # GAP-1
session:                                   # GAP-1
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows templates found within 30s
  - Click "css:[data-test='folderInstance'] [data-test='expand']"   # GAP-2: css target
  - Click "Add Template"
  - assert: page shows Save within 15s
