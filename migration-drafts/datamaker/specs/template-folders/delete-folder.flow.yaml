# Migrates: templateFolders.test.ts :: "Delete template folder"
# The first folder row's options icon is targeted by data-test; with a fresh
# seed the first folder is playwrightTemplateFolder.
name: Template folders - delete a folder
app: web
url: ${DM_BASE_URL}/templates             # GAP-1
session:                                   # GAP-1
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows templates found within 30s
  - Click "css:[data-test='folderInstance'] [data-test='expand']"   # GAP-2: css target
  - Click "Delete Folder"
  - assert: page does not show playwrightTemplateFolder within 15s  # GAP-3: negative
