# Migrates: teamSettings.test.ts :: "Remove team member"
# Playwright read the team name back from the input; with a fresh seed the
# name is always PlaywrightTeam (specs assume per-spec seeding — see
# README). Confirming removal closes the dialog.
name: Team settings - remove a team member
app: web
url: ${DM_BASE_URL}/settings              # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows Personal Information within 30s
  - Click "Select Account"                  # shipped in PR #21
  - Click "PlaywrightTeam"
  - Reload the page                         # shipped in PR #23
  - Click "Team"
  - Wait until page shows Team Information within 10s
  - Click "css:[data-test='teamMembersEllipsis']"   # shipped in PR #21
  - Click "Leave Team"
  - Type PlaywrightTeam into the "css:input[name='teamName']" field   # shipped in PR #21
  - Press the "Confirm" button
  - assert: page does not show Confirm within 15s   # shipped in PR #22
