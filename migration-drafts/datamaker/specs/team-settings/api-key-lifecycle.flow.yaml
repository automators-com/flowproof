# Migrates: teamSettings.test.ts :: "Create, copy and delete api key"
# Playwright asserted the POST status; the UI outcomes are the key row
# appearing (masked), the reveal toggle, and the deletion toast.
name: Team settings - create, reveal and delete an API key
app: web
url: ${DM_BASE_URL}/settings              # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows Personal Information within 30s
  - Click "Select Account"                  # shipped in PR #21
  - Click "PlaywrightTeam"
  - Reload the page                         # shipped in PR #23
  - Click "Team"
  - Wait until page shows Team Information within 10s
  - Press the "Create API Key" button
  - Clear the "Enter key name" field        # shipped in PR #21
  - Type Playwright Test API Key into the "Enter key name" field
  - Press the "Create API key" button
  - Wait until page shows Playwright Test API Key within 15s
  - Click "css:button[data-test='showKey']"    # shipped in PR #21
  - Click "css:button[data-test='deleteKey']"  # shipped in PR #21
  - assert: page shows API key deleted successfully within 10s
