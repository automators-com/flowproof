# Migrates: teamSettings.test.ts :: "Update team info"
# The beforeEach dance (account switcher -> pick team -> reload -> Team
# card) is inlined; "Team" matches both the settings card and the tab UI
# (role='tab' is in the text-anchor xpath).
name: Team settings - update team name
app: web
url: ${DM_BASE_URL}/settings              # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows Personal Information within 30s
  - Click "Select Account"                  # shipped in PR #21
  - Click "PlaywrightTeam"
  - Reload the page                         # shipped in PR #23
  - Click "Team"
  - Wait until page shows Team Information within 10s
  - Clear the "css:input[name='name']" field                # shipped in PR #21
  - Type New Team Name into the "css:input[name='name']" field
  - Press the "Save" button
  - assert: page shows Team updated successfully within 10s
