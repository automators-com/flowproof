# Migrates: templates.test.ts :: "Edit template"
# Playwright edited "the first row" (order-dependent); the migration targets
# the seeded root template by name — deterministic against a fresh seed.
name: Templates - edit a template's fields
app: web
url: ${DM_BASE_URL}/templates             # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows templates found within 30s
  - Click "playwrightTemplateRoot"
  - Clear the "Field Name" field           # shipped in PR #21
  - Type Street into the "Field Name" field
  - Press the "Save" button
  - assert: the "css:#live_preview" shows Street within 10s   # shipped in PR #22
