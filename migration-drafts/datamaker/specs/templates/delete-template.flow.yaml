# Migrates: templates.test.ts :: "Delete template"
name: Templates - delete a template
app: web
url: ${DM_BASE_URL}/templates             # GAP-1
session:                                   # GAP-1
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows templates found within 30s
  - Click "playwrightTemplateRoot"
  - Click "css:svg.h-7[name='form_options']"   # GAP-2: css target
  - Click "Delete Template"
  - assert: page does not show playwrightTemplateRoot within 15s   # GAP-3: negative
