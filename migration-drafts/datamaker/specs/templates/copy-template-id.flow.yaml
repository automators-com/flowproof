# Migrates: templates.test.ts :: "Copy Template ID"
# Reduced coverage: Playwright verified the clipboard by pasting it back
# (Control+V) and comparing the input value. Clipboard readback is out of
# scope (see GAPS.md) — the spec asserts the visible "Copied" confirmation.
name: Templates - copy a template's ID
app: web
url: ${DM_BASE_URL}/templates             # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows templates found within 30s
  - Click "playwrightTemplateRoot"
  - Click "css:svg.h-7[name='form_options']"   # shipped in PR #21
  - Click "Copy Template ID"
  - assert: page shows Copied within 10s
