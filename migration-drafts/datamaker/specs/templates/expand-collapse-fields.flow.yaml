# Migrates: templates.test.ts :: "Expand/Collapse template fields"
# Uses the seeded playwrightTemplate (has 2 fields), which lives inside the
# seeded folder — expand the folder first. The menu entry's label toggles
# between "Expand All Fields" and "Collapse All Fields".
name: Templates - expand and collapse all fields
app: web
url: ${DM_BASE_URL}/templates             # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows templates found within 30s
  - Click "playwrightTemplateFolder"
  - Click "playwrightTemplate"
  - Click "css:svg.h-7[name='form_options']"   # shipped in PR #21
  - assert: page shows Expand All Fields
  - Click "Expand All Fields"
  - Click "css:svg.h-7[name='form_options']"
  - assert: page shows Collapse All Fields
  - Click "Collapse All Fields"
  - Click "css:svg.h-7[name='form_options']"
  - assert: page shows Expand All Fields
