# Migrates: templates.test.ts :: "Create new template"
# Playwright asserted the POST response body; the UI outcome is the live
# preview picking up the field and the new template appearing in the list.
name: Templates - create a new template
app: web
url: ${DM_BASE_URL}/templates             # GAP-1
session:                                   # GAP-1
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows templates found within 30s
  - Type TestTemplate into the templateName field
  - Type TemplateField into the "Field Name" field
  - assert: "css:#live_preview" shows TemplateField within 10s   # GAP-3: element-scoped
  - Press the "Save" button
  - Wait until page shows TestTemplate within 15s
