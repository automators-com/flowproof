# Migrates: templates.test.ts :: "Click template Discard button"
# Discard is bound to the Alt+Shift+Backspace hotkey (the app's default).
name: Templates - discard the open template form
app: web
url: ${DM_BASE_URL}/templates             # GAP-1
session:                                   # GAP-1
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows templates found within 30s
  - Click "playwrightTemplateRoot"
  - assert: "css:#live_preview" is visible          # GAP-3: visibility
  - Press Alt+Shift+Backspace                       # GAP-2: chord
  - assert: "css:#live_preview" is not visible within 10s   # GAP-3: visibility
