# Migrates: templates.test.ts :: "Duplicate template"
# Playwright matched the duplicate POST body; the UI outcome is the same
# name appearing twice in the list.
name: Templates - duplicate a template
app: web
url: ${DM_BASE_URL}/templates             # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows templates found within 30s
  - Click "playwrightTemplateRoot"
  - assert: the templateName field contains playwrightTemplateRoot within 10s  # shipped in PR #22
  - Click "css:svg.h-7[name='form_options']"   # shipped in PR #21
  - Click "Duplicate Template"
  - assert: page shows playwrightTemplateRoot 2 times within 15s   # shipped in PR #22
