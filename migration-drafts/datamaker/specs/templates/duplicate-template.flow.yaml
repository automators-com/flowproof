# Migrates: templates.test.ts :: "Duplicate template"
# Playwright matched the duplicate POST body; the UI outcome is the same
# name appearing twice in the list.
name: Templates - duplicate a template
app: web
url: ${DM_BASE_URL}/templates             # GAP-1
session:                                   # GAP-1
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows templates found within 30s
  - Click "playwrightTemplateRoot"
  - assert: the templateName field contains playwrightTemplateRoot within 10s  # GAP-3: field value (form loaded => duplicate sends full payload)
  - Click "css:svg.h-7[name='form_options']"   # GAP-2: css target (form-header ellipsis)
  - Click "Duplicate Template"
  - assert: page shows playwrightTemplateRoot 2 times within 15s   # GAP-3: count
