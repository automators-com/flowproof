# Migrates: accountSettings.test.ts :: "Toggle autosave templates"
# Playwright asserted the PATCH /users payload; here we assert the visible
# outcome: the toggle button's label flips Disable -> Enable and back.
# Seed leaves autosave ON, so the button starts as "Disable".
name: Account settings - toggle autosave templates
app: web
url: ${DM_BASE_URL}/settings              # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows Personal Information within 40s
  - Press the "Disable" button
  - assert: page shows Enable within 10s
  - Press the "Enable" button
  - assert: page shows Disable within 10s
