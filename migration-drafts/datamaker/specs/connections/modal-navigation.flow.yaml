# Migrates: connections.test.ts :: "Use buttons to navigate back in the modal"
name: Connections - navigate and cancel through the creation modal
app: web
url: ${DM_BASE_URL}/connections           # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows connections found within 30s
  - Press the "Add Connection" button
  - assert: page shows Cancel
  - Press the "Cancel" button
  - assert: page does not show Cancel within 10s           # shipped in PR #22
  - Press the "Add Connection" button
  - Click "Database"                        # shipped in PR #21
  - Press the "Next step" button
  - assert: page shows Next step
  - Press the "Cancel" button
  - Press the "Add Connection" button
  - Click "Database"
  - Press the "Next step" button
  - Click "DB2"
  - Press the "Cancel" button
  - assert: page does not show Next step within 10s        # shipped in PR #22
