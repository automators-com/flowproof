# Migrates: connections.test.ts :: "Create new DB connection"
# Playwright asserted POST /connections + API list; the UI outcomes are the
# success dialog and the new row in the list.
name: Connections - create a database connection
app: web
url: ${DM_BASE_URL}/connections           # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows connections found within 30s
  - Press the "Add Connection" button
  - Click "Database"                        # shipped in PR #21
  - Type TestConnection2 into the "eg. Datamaker Usage Statistics EUW" field
  - Press the "Next step" button
  - Click "PostgreSQL"
  - Type ConnectionString into the "Enter the URL for your Database Connection String" field
  - Press the "Next step" button
  - Wait until page shows Your connection is now ready to use. within 15s
  - Press the "Close" button
  - assert: page shows TestConnection2 within 15s
