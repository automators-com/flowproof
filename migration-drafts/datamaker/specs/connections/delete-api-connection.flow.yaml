# Migrates: connections.test.ts :: "Delete API connection"
name: Connections - delete an API connection
app: web
url: ${DM_BASE_URL}/connections           # GAP-1
session:                                   # GAP-1
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows connections found within 30s
  - Click "Playwright API Folder"
  - Click "Test Endpoint"
  - Click "css:[name='form_options']"       # GAP-2: css target
  - Click "Delete API"
  - assert: page does not show Test Endpoint within 15s    # GAP-3: negative
