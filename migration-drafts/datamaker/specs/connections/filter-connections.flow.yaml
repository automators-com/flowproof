# Migrates: connections.test.ts :: "Filter connections"
# Fresh seed = 1 DB connection (TestConnection) + 1 API endpoint
# (Test Endpoint), both inside "Playwright API Folder".
name: Connections - filter the connections list
app: web
url: ${DM_BASE_URL}/connections           # GAP-1
session:                                   # GAP-1
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows 2 connections found within 30s
  - Click "Playwright API Folder"
  - Type TestConnection into the "Search for a connections" field
  - assert: page shows TestConnection
  - assert: page does not show Test Endpoint within 20s    # GAP-3: negative
  - Clear the "Search for a connections" field             # GAP-2: clear
  - Type Test Endpoint into the "Search for a connections" field
  - assert: page shows Test Endpoint
  - assert: page does not show TestConnection within 20s   # GAP-3: negative
