# Migrates: connections.test.ts :: "Click connection Discard button"
name: Connections - discard the open connection form
app: web
url: ${DM_BASE_URL}/connections           # shipped in PR #23
session:                                   # shipped in PR #23
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows connections found within 30s
  - Click "Playwright API Folder"
  - Click "TestConnection"
  - assert: page shows Connection Name
  - Press the "Discard" button
  - assert: page does not show Connection Name within 10s   # shipped in PR #22
