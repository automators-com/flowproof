# Migrates: connections.test.ts :: "Delete DB connection"
name: Connections - delete a database connection
app: web
url: ${DM_BASE_URL}/connections           # GAP-1
session:                                   # GAP-1
  cookies:
    - name: automators.session
      value: ${DM_SESSION_COOKIE}
  local_storage:
    projectId: ${DM_PROJECT_ID}
    teamId: ${DM_TEAM_ID}
steps:
  - Wait until page shows connections found within 30s
  - Click "Playwright API Folder"
  - Click "TestConnection"
  - Click "css:[name='form_options']"       # GAP-2: css target (form ellipsis)
  - Click "Delete Connection"
  - assert: page does not show TestConnection within 15s   # GAP-3: negative
