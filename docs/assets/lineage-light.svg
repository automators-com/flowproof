<svg viewBox="0 0 880 190" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-labelledby="lt">
  <title id="lt">Selenium (2004), Robot Framework (2008), Playwright (2020), Flowproof (2026): agents author, a deterministic engine executes — across web, desktop, and Citrix</title>
  <style>
    :root { --name:#24292f; --era:#57606a; --arrow:#8c959f; --fp:#0969da; --tag:#57606a; --tagx:#24292f; }
    .name { font-size: 26px; font-weight: 700; fill: var(--name); }
    .era  { font-size: 12.5px; fill: var(--era); }
    .arrow{ font-size: 26px; fill: var(--arrow); }
    .fp   { fill: var(--fp); }
    .tag  { font-size: 15px; fill: var(--tag); }
    .tagx { fill: var(--tagx); font-weight: 600; }
    .cursor { fill: var(--fp); }

    .s1 { opacity: 0; animation: in 0.6s ease-out 0.4s forwards; }
    .a1 { opacity: 0; animation: in 0.4s ease-out 1.3s forwards; }
    .s2 { opacity: 0; animation: in 0.6s ease-out 1.7s forwards; }
    .a2 { opacity: 0; animation: in 0.4s ease-out 2.6s forwards; }
    .s3 { opacity: 0; animation: in 0.6s ease-out 3.0s forwards; }
    .a3 { opacity: 0; animation: in 0.4s ease-out 3.9s forwards; }
    .s4 { opacity: 0; animation: pop 0.7s cubic-bezier(.2,1.4,.4,1) 4.4s forwards; }
    .t1 { opacity: 0; animation: in 0.8s ease-out 5.4s forwards; }
    .blink { animation: blink 1.1s step-end 5.4s infinite; opacity: 0; }

    @keyframes in   { to { opacity: 1; } }
    @keyframes pop  { 0% { opacity: 0; transform: translateY(8px); }
                      100% { opacity: 1; transform: translateY(0); } }
    @keyframes blink{ 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      .s1,.a1,.s2,.a2,.s3,.a3,.s4,.t1,.blink { animation: none; opacity: 1; }
    }
  </style>

  <g class="s1">
    <text x="20" y="78" class="name">Selenium</text>
    <text x="20" y="104" class="era">2004 · the browser era</text>
  </g>
  <text x="160" y="78" class="arrow a1">→</text>

  <g class="s2">
    <text x="200" y="78" class="name">Robot Framework</text>
    <text x="200" y="104" class="era">2008 · testing + RPA, one framework</text>
  </g>
  <text x="452" y="78" class="arrow a2">→</text>

  <g class="s3">
    <text x="490" y="78" class="name">Playwright</text>
    <text x="490" y="104" class="era">2020 · the modern web era</text>
  </g>
  <text x="664" y="78" class="arrow a3">→</text>

  <g class="s4">
    <text x="700" y="78" class="name fp">Flowproof</text>
    <text x="700" y="104" class="era fp">2026 · the agent era</text>
  </g>

  <g class="t1">
    <text x="20" y="160" class="tag">$ <tspan class="tagx">agents author, a deterministic engine executes</tspan> — across web, desktop, and Citrix</text>
  </g>
  <rect class="cursor blink" x="768" y="147" width="9" height="17"/>
</svg>
